name: newt
services:
  newt:
    image: fosrl/newt:latest
    container_name: newt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-network
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/newt/.env
    environment:
      - DOCKER_SOCKET=unix:///var/run/docker.sock
    command: --health-file /tmp/healthy
    healthcheck:
      test:
        - CMD
        - test
        - -f
        - /tmp/healthy
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  proxy-network:
    external: true
