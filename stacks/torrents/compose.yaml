name: torrents
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: torrents-qbittorrent
    volumes:
      - /fjellheimen/data/torrents/qbittorrent:/config
      - /xdrive/Media/Downloads:/downloads
    network_mode: service:gluetun
    env_file:
      - /fjellheimen/stacks/.env
    environment:
      WEBUI_PORT: 9090
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:9090 || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: torrents-gluetun
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    expose:
      - 9090
    networks:
      - reverse-proxy
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/torrents/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.qbittorrent.rule: Host(`torrents.fjellhei.men`)
      traefik.http.routers.qbittorrent.entrypoints: websecure
      traefik.http.routers.qbittorrent.middlewares: voidauth@docker,qbittorrent-auth
      traefik.http.middlewares.qbittorrent-auth.headers.customrequestheaders.Authorization: ${QBITTORRENT_BASIC_AUTH}
      traefik.http.services.qbittorrent.loadbalancer.server.port: "9090"
    restart: unless-stopped
networks:
  reverse-proxy:
    external: true
