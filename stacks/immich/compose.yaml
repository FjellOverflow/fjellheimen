name: immich
services:
  server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-server
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
      - /xdrive/Data/Photos:/usr/src/app/external:ro
    networks:
      - reverse-proxy
      - immich
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich.rule: Host(`photos.fjellhei.men`)
      traefik.http.routers.immich.entrypoints: websecure
      traefik.http.services.immich.loadbalancer.server.port: "2283"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: unless-stopped
  machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich-machine-learning
    volumes:
      - /fjellheimen/data/immich/model-cache:/cache
    networks:
      - immich
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    restart: unless-stopped
  redis:
    image: docker.io/valkey/valkey:${IMMICH_VALKEY_VERSION}
    container_name: immich-redis
    networks:
      - immich
    env_file:
      - /fjellheimen/stacks/.env
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  database:
    image: ghcr.io/immich-app/postgres:${IMMICH_POSTGRES_VERSION}
    container_name: immich-database
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - immich
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
    shm_size: 128mb
    restart: unless-stopped
  kiosk:
    image: ghcr.io/damongolding/immich-kiosk:latest
    container_name: immich-kiosk
    networks:
      - immich
      - reverse-proxy
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    environment:
      KIOSK_IMMICH_URL: immich-server:2283
      KIOSK_IMMICH_EXTERNAL_URL: https://photos.fjellhei.men
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich-kiosk.rule: Host(`kiosk.fjellhei.men`)
      traefik.http.routers.immich-kiosk.entrypoints: websecure
      traefik.http.routers.immich-kiosk.middlewares: voidauth@docker
      traefik.http.services.immich-kiosk.loadbalancer.server.port: "3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: wget -nv -t1 --spider http://localhost:3000 || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  immich:
    name: immich
  reverse-proxy:
    external: true
