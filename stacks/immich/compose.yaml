name: immich
services:
  server:
    image: ghcr.io/immich-app/immich-server:v3.0.1
    container_name: immich-server
    volumes:
      - /fjellheimen/data/immich/server:/data
      - /etc/localtime:/etc/localtime:ro
      - /xdrive/Data/Photos:/usr/src/app/external:ro
    networks:
      - reverse-proxy
      - immich
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich.rule: Host(`photos.fjellhei.men`)
      traefik.http.routers.immich.entrypoints: websecure
      traefik.http.services.immich.loadbalancer.server.port: "2283"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: unless-stopped
  machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.1
    container_name: immich-machine-learning
    volumes:
      - /fjellheimen/data/immich/model-cache:/cache
    networks:
      - immich
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    restart: unless-stopped
  redis:
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    container_name: immich-redis
    networks:
      - immich
    env_file:
      - /fjellheimen/stacks/.env
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich-database
    volumes:
      - /fjellheimen/data/immich/database:/var/lib/postgresql/data
    networks:
      - immich
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
    shm_size: 128mb
    restart: unless-stopped
  kiosk:
    image: ghcr.io/damongolding/immich-kiosk:0.40.2
    container_name: immich-kiosk
    networks:
      - immich
      - reverse-proxy
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/immich/.env
    environment:
      KIOSK_IMMICH_URL: immich-server:2283
      KIOSK_IMMICH_EXTERNAL_URL: https://photos.fjellhei.men
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich-kiosk.rule: Host(`kiosk.fjellhei.men`)
      traefik.http.routers.immich-kiosk.entrypoints: websecure
      traefik.http.routers.immich-kiosk.middlewares: voidauth@docker
      traefik.http.services.immich-kiosk.loadbalancer.server.port: "3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /kiosk
        - --healthcheck
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  immich:
    name: immich
  reverse-proxy:
    external: true
