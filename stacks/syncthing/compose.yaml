name: syncthing
services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    volumes:
      - /fjellheimen/data/syncthing:/config
      - /xdrive/Syncthing:/data
    networks:
      - reverse-proxy
    env_file:
      - /fjellheimen/stacks/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.syncthing.rule: Host(`sync.fjellhei.men`)
      traefik.http.routers.syncthing.entrypoints: websecure
      traefik.http.routers.syncthing.middlewares: voidauth@docker,syncthing-auth
      traefik.http.middlewares.syncthing-auth.headers.customrequestheaders.Authorization: ${SYNCTHING_BASIC_AUTH}
      traefik.http.services.syncthing.loadbalancer.server.port: "8384"
    healthcheck:
      test: curl --fail http://localhost:8384 || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  reverse-proxy:
    external: true
