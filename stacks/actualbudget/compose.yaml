name: actualbudget
services:
  actualbudget:
    image: ghcr.io/actualbudget/actual:26.6.0
    container_name: actualbudget
    volumes:
      - /fjellheimen/data/actualbudget:/data
    networks:
      - reverse-proxy
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/actualbudget/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.actualbudget.rule: Host(`finances.fjellhei.men`)
      traefik.http.routers.actualbudget.entrypoints: websecure
      traefik.http.routers.actualbudget.middlewares: voidauth@docker
      traefik.http.services.actualbudget.loadbalancer.server.port: "5006"
    healthcheck:
      test:
        - CMD-SHELL
        - node src/scripts/health-check.js
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  reverse-proxy:
    external: true
