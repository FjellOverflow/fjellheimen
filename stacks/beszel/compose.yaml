name: beszel
services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    ports:
      - 8090:8090
    volumes:
      - /fjellheimen/data/beszel/data:/beszel_data
      - /fjellheimen/data/beszel/socket:/beszel_socket
    networks:
      - proxy-network
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/beszel/.env
    environment:
      APP_URL: http://localhost:8090
    healthcheck:
      test:
        - CMD
        - /beszel
        - health
        - --url
        - http://localhost:8090
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    volumes:
      - /fjellheimen/data/beszel/agent:/var/lib/beszel-agent
      - /fjellheimen/data/beszel/socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /xdrive/.beszel:/extra-filesystems/sda1__HDD:ro
      - /proc/diskstats:/proc/diskstats:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    network_mode: host
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/beszel/.env
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:8090
    depends_on:
      beszel:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /agent
        - health
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  proxy-network:
    external: true
