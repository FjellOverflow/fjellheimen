name: freshrss
services:
  freshrss:
    image: ghcr.io/freshrss/freshrss:1.29.1
    container_name: freshrss
    volumes:
      - /fjellheimen/data/freshrss/data:/var/www/FreshRSS/data
      - /fjellheimen/data/freshrss/extensions:/var/www/FreshRSS/extensions
    networks:
      - reverse-proxy
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/freshrss/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.feed.rule: Host(`feed.fjellhei.men`)
      traefik.http.routers.feed.entrypoints: websecure
      traefik.http.services.feed.loadbalancer.server.port: "80"
    restart: unless-stopped
networks:
  reverse-proxy:
    external: true
