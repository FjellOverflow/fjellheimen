name: linkding
services:
  linkding:
    image: sissbruecker/linkding:latest
    container_name: linkding
    volumes:
      - /fjellheimen/data/linkding:/etc/linkding/data
    networks:
      - reverse-proxy
    extra_hosts:
      - auth.fjellhei.men:172.20.0.2
    env_file:
      - /fjellheimen/stacks/.env
      - /fjellheimen/stacks/linkding/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.linkding.rule: Host(`bookmarks.fjellhei.men`)
      traefik.http.routers.linkding.entrypoints: websecure
      traefik.http.routers.linkding.middlewares: voidauth@docker
      traefik.http.services.linkding.loadbalancer.server.port: "9090"
    healthcheck:
      test: curl --fail http://localhost:9090 || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped
networks:
  reverse-proxy:
    external: true
