---
- name: Add offsite-backup cronjob
   ansible.builtin.cron:
    name: "Run offsite-backup job"
    minute: "0"
    hour: "4"
    weekday: "4"
    job: "/fjellheimen/jobs/offsite_backup"

- name: Add backup cronjob
  ansible.builtin.cron:
    name: "Run backup job"
    minute: "0"
    hour: "4"
    weekday: "5"
    job: "/fjellheimen/jobs/backup"

- name: Add server boot cronjob
  ansible.builtin.cron:
    name: "Job on server start"
    special_time: "reboot"
    job: "/fjellheimen/jobs/on_startup"
