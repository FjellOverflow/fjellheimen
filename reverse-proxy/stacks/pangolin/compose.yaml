name: pangolin
services:
  config-init:
    image: alpine:3
    container_name: config-init
    volumes:
      - /fjellheimen/reverse-proxy/stacks/pangolin/templates:/templates:ro
      - /fjellheimen/reverse-proxy/data/pangolin/config:/config
    env_file:
      - /fjellheimen/reverse-proxy/stacks/pangolin/.env
    command:
      - sh
      - -c
      - |
        apk add --no-cache gettext
        envsubst < /templates/config/config.yml > /config/config.yml
        envsubst < /templates/config/privateConfig.yml > /config/privateConfig.yml
        envsubst < /templates/config/traefik/traefik_config.yml > /config/traefik/traefik_config.yml
        envsubst < /templates/config/traefik/dynamic_config.yml > /config/traefik/dynamic_config.yml
    restart: no

  pangolin:
    image: docker.io/fosrl/pangolin:ee-1.16.2
    container_name: pangolin
    depends_on:
      config-init:
        condition: service_completed_successfully
    volumes:
      - /fjellheimen/reverse-proxy/data/pangolin/config:/app/config
    healthcheck:
      test: curl --fail http://localhost:3001/api/v1/ || exit 1
      interval: 1m
      start_period: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  gerbil:
    image: docker.io/fosrl/gerbil:1.3.0
    container_name: gerbil
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80
      - 4444:4444
    volumes:
      - /fjellheimen/reverse-proxy/data/pangolin/config/:/var/config
    depends_on:
      config-init:
        condition: service_completed_successfully
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  traefik:
    image: docker.io/traefik:v3.6
    container_name: traefik
    volumes:
      - /fjellheimen/reverse-proxy/data/pangolin/config/traefik:/etc/traefik:ro
      - /fjellheimen/reverse-proxy/data/pangolin/config/letsencrypt:/letsencrypt
      - /fjellheimen/reverse-proxy/data/pangolin/config/traefik/logs:/var/log/traefik
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    depends_on:
      config-init:
        condition: service_completed_successfully
      pangolin:
        condition: service_healthy
    network_mode: service:gerbil
    restart: unless-stopped

  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    container_name: geoipupdate
    volumes:
      - /fjellheimen/reverse-proxy/data/pangolin/config/geoip:/usr/share/GeoIP
    env_file:
      - /fjellheimen/reverse-proxy/stacks/pangolin/.env
    environment:
      - 'GEOIPUPDATE_EDITION_IDS=GeoLite2-Country GeoLite2-ASN GeoLite2-City'
      - GEOIPUPDATE_FREQUENCY=72
    restart: unless-stopped

networks:
  default:
    driver: bridge
    name: pangolin
    enable_ipv6: true
